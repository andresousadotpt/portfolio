# Served by the Paketo Nginx buildpack (see gitops/applications/kpack).
# The buildpack runs nginx with its prefix at /workspace and as the
# non-root `cnb` user, so: log to stdout/stderr (no writable logs/ dir),
# bind the buildpack-provided {{port}} (PORT env, default 8080) rather
# than 80, and resolve `root` relative to /workspace.
worker_processes auto;
daemon off;

error_log stderr;

events {
    worker_connections 1024;
}

http {
    # Inlined instead of `include mime.types;` so the config is
    # self-contained and doesn't depend on the host's nginx file layout.
    types {
        text/html                 html htm;
        text/css                  css;
        application/javascript    js mjs;
        application/json          json webmanifest;
        image/svg+xml             svg svgz;
        image/png                 png;
        image/jpeg                jpeg jpg;
        image/gif                 gif;
        image/webp                webp;
        image/x-icon              ico;
        font/woff                 woff;
        font/woff2                woff2;
        text/plain                txt;
        application/xml           xml;
    }
    default_type  application/octet-stream;

    log_format cnb 'NginxLog "$request" $status $body_bytes_sent';
    access_log /dev/stdout cnb;

    sendfile        on;
    keepalive_timeout 65;
    # Keep redirects on the public URL, not the internal container PORT.
    port_in_redirect off;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    server {
        listen {{port}};
        server_name _;

        # Relative to the buildpack prefix (/workspace) -> /workspace/out,
        # the Next.js static export output (next.config.ts: output "export").
        root out;
        index index.html;

        location / {
            try_files $uri $uri/ $uri.html /index.html;
        }

        location /_next/static/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location ~* \.(?:css|js|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
            add_header Cache-Control "public, max-age=86400";
        }
    }
}
