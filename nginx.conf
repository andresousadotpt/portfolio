# Served by the Paketo Nginx buildpack (see gitops/applications/kpack).
# The buildpack launches: nginx -p /workspace -c /workspace/nginx.conf
# as the non-root `cnb` user, so:
#   - log to stdout/stderr (no writable logs/ dir under the prefix),
#   - listen on an unprivileged port (8080; matches the Deployment's
#     containerPort) rather than 80,
#   - resolve `root` relative to the /workspace prefix.
worker_processes auto;
daemon off;

error_log stderr;

events {
    worker_connections 1024;
}

http {
    # Inlined instead of `include mime.types;` so the config is
    # self-contained and doesn't depend on the host's nginx file layout.
    types {
        text/html                 html htm;
        text/css                  css;
        application/javascript    js mjs;
        application/json          json webmanifest;
        image/svg+xml             svg svgz;
        image/png                 png;
        image/jpeg                jpeg jpg;
        image/gif                 gif;
        image/webp                webp;
        image/x-icon              ico;
        font/woff                 woff;
        font/woff2                woff2;
        text/plain                txt;
        application/xml           xml;
    }
    default_type  application/octet-stream;

    log_format cnb 'NginxLog "$request" $status $body_bytes_sent';
    access_log /dev/stdout cnb;

    sendfile        on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    server {
        listen 8080;
        server_name _;

        # Relative to the buildpack prefix (/workspace) -> /workspace/out,
        # the Next.js static export output (next.config.ts: output "export").
        root out;
        index index.html;

        # Check $uri.html before $uri/ so /blog serves blog.html directly
        # instead of redirecting to the /blog/ directory (which has no index).
        location / {
            try_files $uri $uri.html $uri/ =404;
        }

        # Serve Next's static 404 page with a real 404 status for unknown routes.
        error_page 404 /404.html;

        location /_next/static/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location ~* \.(?:css|js|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
            add_header Cache-Control "public, max-age=86400";
        }
    }
}
