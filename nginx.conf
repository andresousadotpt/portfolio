worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Inlined instead of `include /etc/nginx/mime.types;` so the config is
    # self-contained and doesn't depend on the host's nginx file layout.
    types {
        text/html                 html htm;
        text/css                  css;
        application/javascript    js mjs;
        application/json          json webmanifest;
        image/svg+xml             svg svgz;
        image/png                 png;
        image/jpeg                jpeg jpg;
        image/gif                 gif;
        image/webp                webp;
        image/x-icon              ico;
        font/woff                 woff;
        font/woff2                woff2;
        text/plain                txt;
        application/xml           xml;
    }
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ $uri.html /index.html;
        }

        location /_next/static/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location ~* \.(?:css|js|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
            add_header Cache-Control "public, max-age=86400";
        }
    }
}
